connector_approach_node:
  ros__parameters:
    result_topic: /spear_recognition/result
    tool_service: /ares_tool_node/tool_action
    chassis_topic: /t0x0101_
    status_topic: /connector_approach/status

    # X-error (m) -> prepare length (m): length = direction_sign_x * x_error + prepare_offset_m
    prepare_offset_m: 0.3
    direction_sign_x: 1.0

    # Chassis forward direction sign; set to -1.0 to invert.
    direction_sign_y: 1.0

    deadband_x_m: 0.005
    deadband_y_m: 0.03

    minimum_forward_speed_mps: 0.03
    forward_timeout_s: 10.0
    prepare_timeout_ms: 20000
    publish_rate_hz: 100.0
