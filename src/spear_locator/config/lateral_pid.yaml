lateral_pid:
  ros__parameters:
    result_topic: /spear_recognition/result
    chassis_topic: /t0x0101_
    status_topic: /lateral_pid/status

    # Position outer-loop PID: position error [m] -> speed [m/s].
    kp: 0.5
    ki: 0.0
    kd: 0.02
    maximum_speed_mps: 0.3
    minimum_speed_mps: 0.1
    integral_limit_m_s: 0.05
    deadband_x_m: 0.005
    deadband_y_m: 0.1
    derivative_filter: 0.7

    # Direction signs; set to -1.0 to invert.
    direction_sign_x: 1.0
    direction_sign_y: 1.0
    # Maximum approach duration after trigger [s].
    approach_timeout_s: 5.0
    publish_rate_hz: 100.0
